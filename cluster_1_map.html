<!DOCTYPE html>
<html>
<head>
    <title>Cluster 1 Route Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>#map { height: 600px; width: 100%; }</style>
</head>
<body>
    <h3>Delivery Route: Cluster 1</h3>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([3.2053, 101.556], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);
        var origin = [3.2053, 101.556];
        var stops = [[3.1932652,101.5458882,"Stop 1: NAD SAMUDERA ENTERPRISE (Fri: Close 12pm-3pm)"],[3.1827378,101.5401381,"Stop 2: RESTORAN LEE HONG KEE SDN. BHD.OPEN-12-3PM MONDAY HALF DAY ONLY"],[3.1928766,101.5291471,"Stop 3: MITAJAYA TRADING"],[3.1972137,101.5324219,"Stop 4: KEDAI BORONG DAN RUNCIT YUSOF MAJU (OPEN 9AM-5PM) (FRIDAY CLOSE) (12PM-2PM REHAT)"],[3.1993666,101.5352935,"Stop 5: KEDAI RUNCIT MOHD FADZIL HAIRI"],[3.1993666,101.5352935,"Stop 6: KEDAI RUNCIT MOHD FADZIL HAIRI (12pm-3pm close)"],[3.2018728,101.5349002,"Stop 7: ISKANDAR BIN HUSAINI (Open 9am-6pm|Fri: 12pm-3pm rest)"],[3.1993933,101.5275686,"Stop 8: KEDAI RUNCIT ZULKIFLY (OPEN 7AM-6 PM) (CLOSE ON FRIDAY 12PM-3PM)"],[3.2118755,101.5300983,"Stop 9: BINTANG HU TRADING(FRIDAY CLOSED)"],[3.2134363,101.5321978,"Stop 10: NORLYS KITCHEN & CATERING"],[3.2174739,101.520213,"Stop 11: NASI KANDAR ALI NAS MAJU (Restoran Alinas Aman Putri)"],[3.2219337,101.5197575,"Stop 12: PEMBORONG & PERUNCIT LINA (Sat: Close)"],[3.2250317,101.4981694,"Stop 13: NASABE ENTERPRISE (12pm-3pm close)"],[3.2073436,101.4969526,"Stop 14: BINTANG HU TRADING (FRIDAY CLOSED)"],[3.2032786,101.4843394,"Stop 15: RESTORAN NURI AL NISAR"],[3.2009369,101.4766868,"Stop 16: AMA WORLDWIDE SDN BHD (Open 8am-8pm) Friday closed"],[3.1995828,101.4554655,"Stop 17: KS SMART MART SDN. BHD. (Mon-Sat: 9am-7pm)"],[3.133395,101.45851,"Stop 18: AINUR NADI ENTERPRISE (Fri: 12pm-3pm rest)"],[3.2002098,101.5507472,"Stop 19: PASAR MINI PAYA JARAS"]];
        var routeCoords = [origin].concat(stops.map(function(s){ return [s[0], s[1]]; })).concat([origin]);
        var polyline = L.polyline(routeCoords, { color: 'blue', weight: 4, opacity: 0.7, dashArray: '10, 10' }).addTo(map);
        L.marker(origin).addTo(map).bindPopup('<b>START: Origin</b>');
        stops.forEach(function(s) {
            L.marker([s[0], s[1]]).addTo(map).bindPopup(s[2]);
        });
        map.fitBounds(polyline.getBounds());
    </script>
</body>
</html>
