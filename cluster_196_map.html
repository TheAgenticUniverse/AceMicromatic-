<!DOCTYPE html>
<html>
<head>
    <title>Cluster 196 Route Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>#map { height: 600px; width: 100%; }</style>
</head>
<body>
    <h3>Delivery Route: Cluster 196</h3>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([3.2053, 101.556], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);
        var origin = [3.2053, 101.556];
        var stops = [[2.575877,102.045429,"Stop 1: PASAR MINI HAFIZI"],[2.594095,102.078388,"Stop 2: SHU BEE ENTERPRISE"],[2.58707,102.049179,"Stop 3: PASAR MINI PEDAS"]];
        var routeCoords = [origin].concat(stops.map(function(s){ return [s[0], s[1]]; })).concat([origin]);
        var polyline = L.polyline(routeCoords, { color: 'blue', weight: 4, opacity: 0.7, dashArray: '10, 10' }).addTo(map);
        L.marker(origin).addTo(map).bindPopup('<b>START: Origin</b>');
        stops.forEach(function(s) {
            L.marker([s[0], s[1]]).addTo(map).bindPopup(s[2]);
        });
        map.fitBounds(polyline.getBounds());
    </script>
</body>
</html>
